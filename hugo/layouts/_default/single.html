<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>{{ .Title }} - TZ日报</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 <style>
 :root {
 --bg-primary: #0a0a0a;
 --bg-secondary: #111111;
 --bg-card: #161616;
 --text-primary: #ffffff;
 --text-secondary: #a0a0a0;
 --accent: #ff69b4;
 --accent-light: #ff8dc7;
 }
 
 body { 
 font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; 
 max-width: 900px; 
 margin: 0 auto; 
 padding: 20px;
 background: var(--bg-primary);
 color: var(--text-primary);
 min-height: 100vh;
 }
 
 h1 { 
 color: var(--accent); 
 font-size: 2rem;
 margin-bottom: 1rem;
 }
 
 h2, h3 {
 color: var(--text-primary);
 margin-top: 1.5rem;
 }
 
 .article { 
 margin: 20px 0; 
 padding: 20px; 
 border: 1px solid #28282d; 
 border-radius: 12px; 
 background: var(--bg-card);
 }
 
 .article img {
 max-width: 100%;
 border-radius: 8px;
 margin: 1rem 0;
 }
 
 .article strong {
 color: var(--accent);
 }
 
 .source { 
 color: var(--accent); 
 font-weight: bold; 
 font-size: 0.9rem;
 }
 
 .date { 
 color: var(--text-secondary); 
 font-size: 0.85rem; 
 }
 
 a { 
 color: var(--accent); 
 text-decoration: none;
 }
 
 a:hover {
 color: var(--accent-light);
 text-decoration: underline;
 }
 
 .back-link {
 display: inline-block;
 margin: 2rem 0;
 padding: 10px 20px;
 background: rgba(255, 105, 180, 0.1);
 border: 1px solid var(--accent);
 border-radius: 8px;
 color: var(--accent);
 }
 
 .back-link:hover {
 background: rgba(255, 105, 180, 0.2);
 text-decoration: none;
 }
 
 footer {
 margin-top: 3rem;
 padding-top: 2rem;
 border-top: 1px solid #28282d;
 text-align: center;
 color: var(--text-secondary);
 }
 
 hr {
 border: none;
 height: 1px;
 background: linear-gradient(90deg, var(--accent), transparent);
 margin: 2rem 0;
 }
 </style>
</head>
<body>
 <a href="/" class="back-link">← 返回首页</a>
 
 <h1>{{ .Title }}</h1>
 
 <p class="date">📅 {{ .Date.Format "2006年01月02日" }}</p>
 
 <hr>
 
 {{ .Content }}
 
 <footer>
 <p><a href="/2026-03/">📚 查看往期日报</a></p>
 <p style="color: #666; font-size: 0.8rem; margin-top: 1rem;">TZ日报 · 每日AI资讯聚合</p>
 </footer>
</body>
</html>
