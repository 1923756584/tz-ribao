{{ define "main" }}
<article class="flex flex-col">
  <div class="mb-6">
    <h1 class="text-4xl font-bold mb-2 bg-gradient-to-r from-primary-pink to-primary-purple bg-clip-text text-transparent">
      {{ .Title }}
    </h1>
    
    <div class="flex flex-wrap items-center gap-4 text-sm text-gray-400">
      <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}" class="flex items-center">
        <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/>
        </svg>
        {{ .Date.Format .Site.Params.format.date }}
      </time>
      
      {{ with .ReadingTime }}
      <span class="flex items-center">
        <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 15c1.255 0 2.443.29 3.5.804V4.804zM15 4.804A7.968 7.968 0 0018.5 4c1.255 0 2.443.29 3.5.804v10A7.969 7.969 0 0018.5 15c-1.255 0-2.443-.29-3.5-.804V4.804z"/>
        </svg>
        {{ . }} 分钟阅读
      </span>
      {{ end }}
    </div>
  </div>
  
  <div class="prose prose-invert max-w-none">
    {{ .Content }}
  </div>
</article>
{{ end }}
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - TZ日报</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .article { margin: 20px 0; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        .source { color: #0066cc; font-weight: bold; }
        .date { color: #666; font-size: 0.9em; }
        a { color: #0066cc; }
    </style>
</head>
<body>
    <h1>{{ .Title }}</h1>
    <p><a href="/">返回首页</a></p>
    
    {{ .Content }}
    
    <footer>
        <p><a href="/2026-03/">查看往期日报</a></p>
    </footer>
</body>
</html>
