baseURL = 'https://1923756584.github.io/tz-ribao/'
languageCode = 'zh-cn'
title = 'TZ日报'
theme = 'hextra'

# 网站元数据
[params]
  author = "TZ"
  description = "每日AI资讯聚合 - 聚焦AI产品更新与前沿动态"
  
  # 主题配置
  theme = "dark"
  themeToggle = true
  defaultAppearance = "dark"
  
  # GitHub链接
  displayName = "TZ日报"
  gitRepo = "https://github.com/1923756584/tz-ribao"
  gitBranch = "main"
  
  # 侧边栏配置
  displaySidebar = true
  sidebarCollapsible = true
  sidebarTitle = "历史日报"
  
  # 其他功能
  breadcrumb = true
  toc = true
  feedback = false
  
  # 网站图标
  favicon = "/favicon.ico"
  
  # 自定义CSS
  customCSS = ["/css/custom.css"]

# 导航菜单
[[menu.main]]
  name = "✨ 首页"
  url = "/"
  weight = 1

[[menu.main]]
  name = "📅 历史归档"
  url = "/2026-03/"
  weight = 2

[[menu.main]]
  name = "ℹ️ 关于"
  url = "/about/"
  weight = 3

# 侧边栏菜单
[[menu.sidebar]]
  name = "2026年3月"
  url = "/2026-03/"
  weight = 1
  
[[menu.sidebar]]
  name = "2026年2月"
  url = "/2026-02/"
  weight = 2
  
[[menu.sidebar]]
  name = "2026年1月"
  url = "/2026-01/"
  weight = 3

# 页脚菜单
[[menu.footer]]
  name = "RSS订阅"
  url = "/index.xml"
  weight = 1

[[menu.footer]]
  name = "GitHub"
  url = "https://github.com/1923756584/tz-ribao"
  weight = 2
  target = "_blank"

# 输出格式
[outputs]
  home = ["HTML", "RSS"]

# 标记处理
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'github-dark'

# 日期格式
[params.format]
  date = "2006-01-02"
  dateMonth = "2006年01月"
  dateFull = "2006年01月02日"

# 隐私配置
[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
    disable = true
    respectDoNotTrack = true

# 404页面配置
[params.error]
  title404 = "404 - 页面未找到"
  subtitle404 = "Oops! 这个页面可能已经被AI接管了..."
  description404 = "不如回首页看看今天的AI资讯？"
  buttonText404 = "返回首页"

# Force cache invalidation - 2026-03-03T19:30:00Z

