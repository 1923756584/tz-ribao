# TZ日报 - 网站部署
name: Deploy Site

on:
  # 推送时运行
  push:
    branches:
      - main
  # 定时任务 - 每晚 23:00 自动更新
  schedule:
    - cron: '0 23 * * *'
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.123.0'

      - name: Fetch News
        run: |
          npm run fetch
          # 检查是否有新文件需要提交
          if [ -n "$(git status --porcelain hugo/content/)" ]; then
            echo "发现更新的新闻文件，提交到仓库..."
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add hugo/content/ latest.md
            git commit -m "chore: 更新AI资讯 - $(date +'%Y-%m-%d %H:%M')" || true
            git push origin main || true
          else
            echo "没有新的新闻内容跳过提交"
          fi
        continue-on-error: true
      - name: Build Site
        run: |
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./hugo/public
