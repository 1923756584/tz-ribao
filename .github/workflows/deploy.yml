# TZ日报 - 网站部署 (使用GitHub Actions原生Pages部署)
name: Deploy Site

on:
  # 推送时运行
  push:
    branches:
      - main
  # 定时任务 - 每晚 23:00 自动更新
  # 定时任务 - 每天北京时间 23:00 (UTC 15:00)
  schedule:
    - cron: '0 15 * * *'
    - cron: '0 23 * * *'
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.123.0'

      - name: Fetch News
        run: |
          npm run fetch
          # 检查是否有新文件需要提交
          if [ -n "$(git status --porcelain hugo/content/)" ]; then
            echo "发现更新的新闻文件，提交到仓库..."
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add hugo/content/ latest.md
            git commit -m "chore: 更新AI资讯 - $(date +'%Y-%m-%d %H:%M')" || true
            git push origin main || true
          else
            echo "没有新的新闻内容跳过提交"
          fi
        continue-on-error: true

      - name: Remove Theme Workflows (Prevent Deployment Conflicts)
        run: |
          # 删除主题内置的工作流文件，防止与根项目部署工作流冲突
          rm -f hugo/themes/hextra/.github/workflows/pages.yml || true
          echo "Theme workflows removed to prevent deployment conflicts"

      - name: Clear Hugo Cache & Build
        run: |
          # 清除Hugo缓存以强制完整重新构建
          rm -rf hugo/resources/_gen/ hugo/public/ || true
          npm run build

      - name: Verify Build Output
        run: |
          echo "=== Checking build output ==="
          echo "Public directory exists: $(test -d hugo/public && echo 'YES' || echo 'NO')"
          echo "Files in public: $(ls hugo/public/ | wc -l)"
          echo "Index.html size: $(stat -c%s hugo/public/index.html 2>/dev/null || echo 'N/A')"
          echo "Checking content in index.html:"
          grep -c '2026年3月' hugo/public/index.html || echo "Date not found"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./hugo/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-deploy
    permissions:
      pages: write
      id-token: write
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
