# TZ日报 - 网站部署
name: Deploy Site

on:
  # 推送时运行
  push:
    branches:
      - main
  # 定时任务 - 每晚 23:00 自动更新
  schedule:
    - cron: '0 23 * * *'
  # 支持手动触发
  workflow_dispatch:
  # 每次推送时运行
  push:
    branches:
      - main
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: |
          npm install
          
      - name: Install Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.123.0'
          
      - name: Fetch News
        run: |
          npm run fetch
          
      - name: Build Site
        run: |
          npm run build
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./hugo/public
