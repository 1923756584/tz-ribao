# TZ日报 - 每日自动更新
name: Daily Update

on:
  # 每天 23:00 自动执行
  schedule:
    - cron: '0 23 * * *'
  # 支持手动触发
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  idtoken: write
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      idtoken: write
    
    steps:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: |
          npm install
          
      - name: Install Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.123.0'
          
      - name: Fetch News
        run: |
          npm run fetch
          
      - name: Build Site
        run: |
          npm run build
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./hugo/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
    
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        run: |
          npm run build
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./hugo/public
