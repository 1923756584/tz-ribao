<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TZ日报 v2.0 - 本地预览</title>
  <meta http-equiv="refresh" content="300">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    :root {
      --bg-primary: #0c0c0d;
      --bg-secondary: #161618;
      --bg-hover: #1e1e21;
      --primary-pink: #ff6b9d;
      --primary-purple: #9d4edd;
      --accent-cyan: #4cc9f0;
      --text-primary: #f8f9fa;
      --text-secondary: #a0a0a5;
      --border-color: #28282d;
      --shadow: 0 4px 16px rgba(255, 107, 157, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, #121214 50%, var(--bg-primary) 100%);
      background-size: 400% 400%;
      animation: gradientShift 20s ease infinite;
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }

    header::before {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 4px;
      background: linear-gradient(90deg, var(--primary-pink), var(--primary-purple));
      border-radius: 2px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(45deg, var(--primary-pink), var(--primary-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1.2rem;
      font-weight: 500;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: var(--primary-purple);
      box-shadow: var(--shadow);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(45deg, var(--primary-pink), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      color: var(--text-secondary);
      margin-top: 5px;
    }

    .sections {
      display: grid;
      gap: 30px;
    }

    .section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
    }

    .section-header {
      background: linear-gradient(45deg, var(--primary-pink), var(--primary-purple));
      padding: 20px 24px;
      position: relative;
    }

    .section-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
    }

    .section-title {
      color: white;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .articles {
      padding: 20px;
    }

    .article-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      transition: all 0.3s ease;
    }

    .article-card:hover {
      border-color: var(--primary-pink);
      box-shadow: var(--shadow);
    }

    .article-source {
      color: var(--accent-cyan);
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .article-source::before {
      content: '📡';
      margin-right: 6px;
    }

    .article-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .article-summary {
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .article-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .read-more {
      color: var(--primary-pink);
      text-decoration: none;
      font-weight: 500;
    }

    .read-more:hover {
      color: var(--primary-purple);
    }

    .category-badge {
      display: inline-block;
      background: rgba(157, 78, 221, 0.1);
      border: 1px solid var(--primary-purple);
      color: var(--primary-purple);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-secondary);
    }

    .spinner {
      border: 3px solid rgba(157, 78, 221, 0.2);
      border-radius: 50%;
      border-top: 3px solid var(--primary-purple);
      width: 40px;
      height: 40px;
      margin: 0 auto 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      text-align: center;
      padding: 40px 20px;
      margin-top: 40px;
      border-top: 1px solid var(--border-color);
      color: var(--text-secondary);
    }

    .github-link {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: linear-gradient(45deg, var(--primary-pink), var(--primary-purple));
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.3s;
    }

    .github-link:hover {
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      .container { padding: 15px; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>TZ日报 v2.0</h1>
      <p class="subtitle">每日AI资讯聚合 · 粉黑色调设计 · 智能摘要翻译</p>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number">35</div>
        <div class="stat-label">RSS源总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">6</div>
        <div class="stat-label">X平台账号</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">80</div>
        <div class="stat-label">最大新闻数</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">9</div>
        <div class="stat-label">内容分类</div>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在加载今日AI资讯...</p>
    </div>

    <div class="sections" id="content" style="display: none;">
      <!-- 动态内容将插入这里 -->
    </div>

    <div class="footer">
      <p>用 Hugo + 自定义CSS 构建 | 2026年3月2日更新</p>
      <p>每晚会自动生成最新一期的AI资讯日报</p>
      <a href="https://github.com/1923756584/tz-ribao" class="github-link" target="_blank">
        🚀 查看GitHub源码
      </a>
    </div>
  </div>

  <script>
    // 模拟加载内容
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      
      // 获取最新日报内容
      fetch('./content/2026-03/20260302.md')
        .then(response => response.text())
        .then(markdown => {
          displayContent(markdown);
        })
        .catch(err => {
          console.error('加载失败:', err);
          document.getElementById('content').innerHTML = '<div class="loading">暂无内容</div>';
        });
    }, 2000);

    function displayContent(markdown) {
      // 解析markdown内容
      const content = markdown.replace(/---[\s\S]*?---/, '').trim();
      
      // 提取各个部分
      const sections = [];
      let currentSection = '';
      const lines = content.split('\n');
      
      lines.forEach(line => {
        if (line.startsWith('##')) {
          if (currentSection) sections.push(parseSection(currentSection));
          currentSection = line + '\n';
        } else {
          currentSection += line + '\n';
        }
      });
      
      if (currentSection) sections.push(parseSection(currentSection));
      
      const html = sections.map(section => `
        <div class="section">
          <div class="section-header">
            <div class="section-title">${section.title}</div>
          </div>
          <div class="articles">
            ${section.articles.map(article => `
              <div class="article-card">
                <div class="category-badge">${article.category || '资讯'}</div>
                <div class="article-source">${article.source}</div>
                <div class="article-title">${article.title}</div>
                <div class="article-summary">${article.summary || '正在加载摘要...'}</div>
                <div class="article-meta">
                  <span>${article.date}</span>
                  <a href="${article.link}" class="read-more" target="_blank">阅读原文 →</a>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
      
      document.getElementById('content').innerHTML = html;
    }

    function parseSection(text) {
      const lines = text.trim().split('\n');
      const title = lines[0].replace('## ', '').trim();
      
      const articles = [];
      let currentArticle = null;
      
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        
        if (line.startsWith('###')) {
          if (currentArticle) articles.push(currentArticle);
          currentArticle = {
            source: line.replace('### ', '').trim(),
            title: '',
            summary: '',
            link: '',
            date: '2026-03-02',
            category: extractCategory(title)
          };
          continue;
        }
        
        if (currentArticle) {
          if (line.startsWith('[原文链接]')) {
            const match = line.match(/\((.*)\)/);
            if (match) currentArticle.link = match[1];
          } else if (line.includes('**')) {
            const titleMatch = line.match(/\*\*(.*)\*\*/);
            if (titleMatch) {
              currentArticle.title = titleMatch[1];
            } else {
              currentArticle.summary = line.replace(/\*\*/g, '');
            }
          } else if (line && !line.startsWith('---') && !line.includes('原文链接')) {
            currentArticle.summary += line + ' ';
          }
        }
      }
      
      if (currentArticle) articles.push(currentArticle);
      
      return { title, articles };
    }

    function extractCategory(title) {
      if (title.includes('中文')) return '🇨🇳 中文';
      if (title.includes('AI')) return '🤖 AI';
      if (title.includes('新闻')) return '📰 新闻';
      return '📄 资讯';
    }
  </script>
</body>
</html>
